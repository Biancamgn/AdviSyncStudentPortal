<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email System — Adviser Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    
    <style>
/* === shared.css === */
:root {
    --dlsu-green: #00703c;
    --dlsu-green-dark: #005a30;
    --dlsu-green-light: #e8f5ee;
    --dlsu-green-muted: #4a9e6f;
    --dlsu-white: #ffffff;
    --dlsu-gray-50: #f8faf9;
    --dlsu-gray-100: #f0f4f2;
    --dlsu-gray-200: #e2e8e5;
    --dlsu-gray-400: #94a89c;
    --dlsu-gray-600: #5a6b60;
    --dlsu-gray-800: #2d3a32;
    --dlsu-warning: #e6a817;
    --dlsu-danger: #c0392b;
    --dlsu-info: #2980b9;
    --sidebar-collapsed: 70px;
    --sidebar-expanded: 250px;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Plus Jakarta Sans", sans-serif;
    background-color: var(--dlsu-gray-50);
    color: var(--dlsu-gray-800);
    min-height: 100vh;
}

.sidebar {
    position: fixed;
    top: 0;
    left: 0;
    width: var(--sidebar-collapsed);
    height: 100vh;
    background: var(--dlsu-green);
    color: white;
    display: flex;
    flex-direction: column;
    z-index: 1000;
    transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
    border-radius: 0 18px 18px 0;
}

.sidebar.expanded {
    width: var(--sidebar-expanded);
}

/* Brand */
.sidebar-brand {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.2rem 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    min-height: 68px;
    overflow: hidden;
}

.sidebar-brand .brand-icon {
    width: 38px;
    height: 38px;
    min-width: 38px;
    background: rgba(255, 255, 255, 0.18);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
}

.sidebar-brand .brand-text {
    opacity: 0;
    white-space: nowrap;
    margin-left: 0.75rem;
    transition: opacity 0.15s ease;
    width: 0;
    overflow: hidden;
}

.sidebar.expanded .sidebar-brand {
    justify-content: flex-start;
    padding-left: 1rem;
}
.sidebar.expanded .brand-text {
    opacity: 1;
    width: auto;
}

.sidebar-brand h6 {
    font-size: 0.88rem;
    font-weight: 700;
    margin: 0;
}
.sidebar-brand small {
    font-size: 0.63rem;
    opacity: 0.6;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

/* Nav */
.sidebar-nav {
    flex: 1;
    padding: 0.6rem 0;
    overflow-y: auto;
    overflow-x: hidden;
}

.nav-section-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 600;
    white-space: nowrap;
    color: rgba(255, 255, 255, 0.4);
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    padding: 0 1.1rem;
    transition:
        max-height 0.3s ease,
        opacity 0.2s ease,
        padding 0.3s ease;
}

.sidebar.expanded .nav-section-label {
    max-height: 30px;
    opacity: 1;
    padding: 0.7rem 1.1rem 0.3rem;
}

.nav-divider {
    height: 1px;
    background: rgba(255, 255, 255, 0.1);
    margin: 0.4rem 1.1rem;
    transition: opacity 0.2s ease;
}

.sidebar.expanded .nav-divider {
    opacity: 0;
    margin: 0;
    height: 0;
}

/* Nav Links */
.sidebar-nav .nav-link {
    color: rgba(255, 255, 255, 0.65);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0.65rem 0;
    margin: 2px 0.5rem;
    border-radius: 10px;
    font-size: 0.82rem;
    font-weight: 500;
    white-space: nowrap;
    position: relative;
    transition: all 0.2s ease;
    text-decoration: none;
}

.sidebar-nav .nav-link i {
    font-size: 1.2rem;
    width: 22px;
    min-width: 22px;
    text-align: center;
    transition: margin 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.sidebar-nav .nav-link .link-text {
    opacity: 0;
    width: 0;
    overflow: hidden;
    margin-left: 0;
    transition:
        opacity 0.15s ease,
        width 0.3s ease,
        margin 0.3s ease;
}

.sidebar.expanded .nav-link {
    justify-content: flex-start;
    padding: 0.55rem 0.75rem;
}
.sidebar.expanded .nav-link i {
    margin-left: 0.35rem;
}
.sidebar.expanded .nav-link .link-text {
    opacity: 1;
    width: auto;
    margin-left: 0.75rem;
}

.sidebar-nav .nav-link:hover {
    color: white;
    background: rgba(255, 255, 255, 0.12);
}
.sidebar-nav .nav-link.active {
    color: white;
    background: rgba(255, 255, 255, 0.18);
    font-weight: 600;
}

.sidebar-nav .nav-link.active::before {
    content: "";
    position: absolute;
    left: -0.5rem;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 20px;
    background: white;
    border-radius: 0 3px 3px 0;
}

/* Footer */
.sidebar-footer {
    padding: 0.85rem 0;
    border-top: 1px solid rgba(255, 255, 255, 0.12);
    display: flex;
    justify-content: center;
}

.sidebar.expanded .sidebar-footer {
    justify-content: flex-start;
    padding-left: 1rem;
}

.sidebar-footer .user-card {
    display: flex;
    align-items: center;
    gap: 0.65rem;
}

.sidebar-footer .avatar {
    width: 34px;
    height: 34px;
    min-width: 34px;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.18);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.75rem;
}

.sidebar-footer .user-info {
    opacity: 0;
    white-space: nowrap;
    width: 0;
    overflow: hidden;
    transition: opacity 0.15s ease;
}

.sidebar.expanded .sidebar-footer .user-info {
    opacity: 1;
    width: auto;
}

.sidebar-footer .user-name {
    font-size: 0.78rem;
    font-weight: 600;
}
.sidebar-footer .user-id {
    font-size: 0.65rem;
    opacity: 0.6;
}

.main-content {
    margin-left: var(--sidebar-collapsed);
    min-height: 100vh;
    transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.main-content.shifted {
    margin-left: var(--sidebar-expanded);
}

.topbar {
    background: white;
    padding: 0.75rem 2rem;
    border-bottom: 1px solid var(--dlsu-gray-200);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
}

.topbar-left h1 {
    font-size: 1.15rem;
    font-weight: 700;
    margin: 0;
}
.topbar-left p {
    font-size: 0.78rem;
    color: var(--dlsu-gray-400);
    margin: 0;
}

.topbar-right {
    display: flex;
    align-items: center;
    gap: 0.75rem;
}

.topbar-circle-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 1px solid var(--dlsu-gray-200);
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--dlsu-gray-600);
    cursor: pointer;
    position: relative;
    transition: all 0.2s ease;
}

.topbar-circle-btn:hover {
    background: var(--dlsu-gray-100);
    color: var(--dlsu-green);
    border-color: var(--dlsu-gray-400);
}
.topbar-circle-btn i {
    font-size: 1.1rem;
}

.topbar-circle-btn .notif-badge {
    position: absolute;
    top: -2px;
    right: -2px;
    width: 20px;
    height: 20px;
    background: var(--dlsu-danger);
    color: white;
    border-radius: 50%;
    font-size: 0.6rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid white;
}

.topbar-clock {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--dlsu-gray-600);
    font-variant-numeric: tabular-nums;
    padding: 0.35rem 0.75rem;
    background: var(--dlsu-gray-100);
    border-radius: 20px;
    white-space: nowrap;
}

/* Profile button (topbar) */
.profile-wrapper {
    position: relative;
}

.profile-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 2px solid var(--dlsu-gray-200);
    background: var(--dlsu-green);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 700;
    transition: all 0.2s ease;
}

.profile-btn:hover {
    border-color: var(--dlsu-green);
    box-shadow: 0 0 0 3px var(--dlsu-green-light);
}

.profile-chevron {
    color: var(--dlsu-gray-400);
    font-size: 0.75rem;
    cursor: pointer;
    transition: transform 0.2s ease;
}

.profile-wrapper.open .profile-chevron {
    transform: rotate(180deg);
}

/* Profile Dropdown */
.profile-dropdown {
    position: absolute;
    top: calc(100% + 10px);
    right: 0;
    width: 260px;
    background: white;
    border-radius: 12px;
    box-shadow:
        0 10px 40px rgba(0, 0, 0, 0.12),
        0 2px 8px rgba(0, 0, 0, 0.06);
    border: 1px solid var(--dlsu-gray-200);
    opacity: 0;
    visibility: hidden;
    transform: translateY(-8px);
    transition: all 0.2s ease;
    z-index: 200;
    overflow: hidden;
}

.profile-wrapper.open .profile-dropdown {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}

.dropdown-header {
    padding: 1rem 1.15rem;
    background: var(--dlsu-gray-50);
    border-bottom: 1px solid var(--dlsu-gray-200);
    display: flex;
    align-items: center;
    gap: 0.75rem;
}

.dropdown-header .dropdown-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--dlsu-green);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.85rem;
    flex-shrink: 0;
}

.dropdown-header .dropdown-name {
    font-size: 0.85rem;
    font-weight: 700;
}
.dropdown-header .dropdown-role {
    font-size: 0.7rem;
    color: var(--dlsu-green);
    font-weight: 600;
}

.dropdown-info {
    padding: 0.75rem 1.15rem;
}
.dropdown-info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.4rem 0;
}
.dropdown-info-row:not(:last-child) {
    border-bottom: 1px solid var(--dlsu-gray-100);
}
.dropdown-info-label {
    font-size: 0.7rem;
    color: var(--dlsu-gray-400);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.03em;
}
.dropdown-info-value {
    font-size: 0.78rem;
    color: var(--dlsu-gray-800);
    font-weight: 600;
}
.dropdown-divider {
    height: 1px;
    background: var(--dlsu-gray-200);
}

.dropdown-action {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.75rem 1.15rem;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--dlsu-gray-600);
    cursor: pointer;
    transition: all 0.15s ease;
    text-decoration: none;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
}

.dropdown-action:hover {
    background: var(--dlsu-gray-50);
    color: var(--dlsu-gray-800);
}
.dropdown-action.logout {
    color: var(--dlsu-danger);
}
.dropdown-action.logout:hover {
    background: #fdeaea;
}
.dropdown-action i {
    font-size: 1rem;
    width: 18px;
    text-align: center;
}

.hamburger-btn {
    display: none;
    background: none;
    border: none;
    font-size: 1.3rem;
    color: var(--dlsu-gray-800);
    cursor: pointer;
    margin-right: 0.75rem;
}

/* Mobile Overlay */
.sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.4);
    z-index: 999;
}

@media (max-width: 991.98px) {
    .sidebar {
        width: 0;
        border-radius: 0;
    }
    .sidebar.expanded {
        width: var(--sidebar-expanded);
    }
    .sidebar-overlay.active {
        display: block;
    }
    .main-content,
    .main-content.shifted {
        margin-left: 0;
    }
    .hamburger-btn {
        display: block;
    }
    .topbar {
        padding: 0.85rem 1rem;
    }
}

body.dark-mode {
    --dlsu-gray-50: #121212;
    --dlsu-gray-100: #1e1e1e;
    --dlsu-gray-200: #2a2a2a;
    --dlsu-gray-400: #6b6b6b;
    --dlsu-gray-600: #a0a0a0;
    --dlsu-gray-800: #e8e8e8;
    --dlsu-green-light: #1a3a28;
    background-color: #0e0e0e;
    color: #e8e8e8;
}

/* Topbar */
body.dark-mode .topbar {
    background: #1a1a1a;
    border-bottom-color: #2a2a2a;
}

body.dark-mode .topbar-circle-btn {
    background: #1e1e1e;
    border-color: #333;
    color: #a0a0a0;
}

body.dark-mode .topbar-circle-btn:hover {
    background: #2a2a2a;
    color: var(--dlsu-green);
    border-color: #444;
}

body.dark-mode .topbar-clock {
    background: #1e1e1e;
    color: #a0a0a0;
}

body.dark-mode .profile-btn {
    border-color: #333;
}

body.dark-mode .profile-dropdown {
    background: #1e1e1e;
    border-color: #333;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
}

body.dark-mode .dropdown-header {
    background: #161616;
    border-bottom-color: #2a2a2a;
}

body.dark-mode .dropdown-info-row:not(:last-child) {
    border-bottom-color: #2a2a2a;
}

body.dark-mode .dropdown-divider {
    background: #2a2a2a;
}

body.dark-mode .dropdown-action:hover {
    background: #252525;
}

body.dark-mode .dropdown-action.logout:hover {
    background: #2a1515;
}

/* Sidebar — keep green but darken slightly */
body.dark-mode .sidebar {
    background: #00572e;
}

body.dark-mode .sidebar-brand {
    border-bottom-color: rgba(255, 255, 255, 0.08);
}

body.dark-mode .sidebar-footer {
    border-top-color: rgba(255, 255, 255, 0.08);
}

/* Main content area */
body.dark-mode .main-content {
    background: #0e0e0e;
}

/* Content cards, tables, form inputs */
body.dark-mode .content-card,
body.dark-mode .section-card,
body.dark-mode .submission-card,
body.dark-mode .concern-card,
body.dark-mode .adviser-section,
body.dark-mode .booking-item {
    background: #1a1a1a;
    border-color: #2a2a2a;
}

body.dark-mode .stat-card.card-green {
    background: #122e1d;
}
body.dark-mode .stat-card.card-amber {
    background: #2e2510;
}
body.dark-mode .stat-card.card-pink {
    background: #2e1515;
}
body.dark-mode .stat-card.card-blue {
    background: #121e2e;
}

body.dark-mode .welcome-banner {
    background: linear-gradient(135deg, #00572e 0%, #003d1f 100%);
}

/* Tables */
body.dark-mode .risk-table thead th,
body.dark-mode .advisee-table thead th,
body.dark-mode .tracker-table thead th,
body.dark-mode .bookings-table thead th,
body.dark-mode .term-table thead th,
body.dark-mode .subjects-table thead th,
body.dark-mode .review-table th {
    background: #161616;
    border-bottom-color: #2a2a2a;
    color: #6b6b6b;
}

body.dark-mode .risk-table tbody td,
body.dark-mode .advisee-table tbody td,
body.dark-mode .tracker-table tbody td,
body.dark-mode .bookings-table tbody td,
body.dark-mode .term-table tbody td,
body.dark-mode .subjects-table tbody td,
body.dark-mode .review-table td {
    border-bottom-color: #222;
}

body.dark-mode .advisee-table tbody tr:hover {
    background: #1e1e1e;
}

body.dark-mode .advisee-table {
    background: #1a1a1a;
    border-color: #2a2a2a;
}

/* Form controls */
body.dark-mode .form-control-custom,
body.dark-mode .filter-select,
body.dark-mode .search-box input {
    background: #1e1e1e;
    border-color: #333;
    color: #e8e8e8;
}

body.dark-mode .form-control-custom:focus,
body.dark-mode .filter-select:focus,
body.dark-mode .search-box input:focus {
    border-color: var(--dlsu-green);
    box-shadow: 0 0 0 3px rgba(0, 112, 60, 0.2);
}

body.dark-mode .form-control-custom::placeholder,
body.dark-mode .search-box input::placeholder {
    color: #555;
}

/* Quick action buttons */
body.dark-mode .quick-action-btn {
    background: #1a1a1a;
    border-color: #2a2a2a;
    color: #a0a0a0;
}

body.dark-mode .quick-action-btn:hover {
    background: #1a3a28;
    border-color: var(--dlsu-green);
    color: var(--dlsu-green);
}

/* Summary chips */
body.dark-mode .summary-chip {
    background: #1a1a1a;
    border-color: #2a2a2a;
}

/* Filter chips */
body.dark-mode .filter-chip {
    background: #1a1a1a;
    border-color: #333;
    color: #a0a0a0;
}

body.dark-mode .filter-chip.active {
    background: var(--dlsu-green);
    color: white;
    border-color: var(--dlsu-green);
}

/* Tab bar */
body.dark-mode .tab-bar {
    border-bottom-color: #2a2a2a;
}

body.dark-mode .tab-count {
    background: #2a2a2a;
    color: #6b6b6b;
}

body.dark-mode .tab-item.active .tab-count {
    background: #1a3a28;
}

/* Mode toggle (email system) */
body.dark-mode .mode-toggle {
    background: #1e1e1e;
}

body.dark-mode .mode-btn.active {
    background: #2a2a2a;
    box-shadow: none;
}

/* Upload areas */
body.dark-mode .upload-area {
    border-color: #333;
    background: #161616;
}

body.dark-mode .upload-area:hover {
    border-color: var(--dlsu-green);
    background: #1a3a28;
}

/* Radio cards */
body.dark-mode .radio-card {
    background: #1a1a1a;
    border-color: #2a2a2a;
}

body.dark-mode .radio-card.selected {
    border-color: var(--dlsu-green);
    background: #1a3a28;
}

/* Adviser card / banner */
body.dark-mode .adviser-card,
body.dark-mode .adviser-banner {
    background: #1a3a28;
}

/* Deadline display */
body.dark-mode .deadline-display {
    background: #1a3a28;
}

/* Progress bar */
body.dark-mode .progress-bar-custom {
    background: #2a2a2a;
}

/* ══ STUDENT ID TABS ══ */

.student-id-tabs {
    background: var(--dlsu-gray-50);
    border-bottom: 1px solid var(--dlsu-gray-200);
}

.student-id-tabs .btn {
    font-size: 0.78rem;
    font-weight: 600;
    padding: 0.5rem 1rem;
    border-radius: 8px;
    border: 1px solid var(--dlsu-gray-200);
    background: white;
    color: var(--dlsu-gray-600);
    transition: all 0.2s ease;
}

.student-id-tabs .btn:hover {
    background: var(--dlsu-gray-100);
    border-color: var(--dlsu-gray-300);
    color: var(--dlsu-gray-800);
}

.student-id-tabs .btn-primary {
    background: var(--dlsu-green);
    border-color: var(--dlsu-green);
    color: white;
}

.student-id-tabs .btn-primary:hover {
    background: var(--dlsu-green-dark);
    border-color: var(--dlsu-green-dark);
}

.student-id-tabs .btn-outline-primary {
    background: white;
    border-color: var(--dlsu-gray-200);
    color: var(--dlsu-gray-600);
}

.student-id-tabs .btn-outline-primary:hover {
    background: var(--dlsu-gray-50);
    border-color: var(--dlsu-green);
    color: var(--dlsu-green);
}

/* Dark mode for student ID tabs */
body.dark-mode .student-id-tabs {
    background: #1a1a1a;
    border-bottom-color: #2a2a2a;
}

body.dark-mode .student-id-tabs .btn {
    background: #2a2a2a;
    border-color: #333;
    color: #a0a0a0;
}

body.dark-mode .student-id-tabs .btn:hover {
    background: #333;
    border-color: #444;
    color: #c0c0c0;
}

body.dark-mode .student-id-tabs .btn-primary {
    background: var(--dlsu-green);
    border-color: var(--dlsu-green);
    color: white;
}

body.dark-mode .student-id-tabs .btn-outline-primary {
    background: #2a2a2a;
    border-color: #333;
    color: #a0a0a0;
}

/* === email-system.css === */
.page-body {
    padding: 1.75rem 2rem;
    max-width: 920px;
    margin: 0 auto;
}

.page-title {
    font-size: 1.4rem;
    font-weight: 800;
    color: var(--dlsu-green);
    margin-bottom: 0.3rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.page-subtitle {
    font-size: 0.82rem;
    color: var(--dlsu-gray-400);
    margin-bottom: 1.75rem;
}

/* Mode Toggle */
.mode-toggle {
    display: flex;
    background: var(--dlsu-gray-100);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 1.5rem;
    width: fit-content;
}

.mode-btn {
    padding: 0.5rem 1.25rem;
    border: none;
    border-radius: 8px;
    font-size: 0.82rem;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    background: transparent;
    color: var(--dlsu-gray-400);
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 0.4rem;
}

.mode-btn.active {
    background: white;
    color: var(--dlsu-green);
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
}

/* Section Card */
.section-card {
    background: white;
    border-radius: 14px;
    border: 1px solid var(--dlsu-gray-200);
    padding: 1.5rem;
    margin-bottom: 1.5rem;
}

.section-title {
    font-size: 0.95rem;
    font-weight: 700;
    margin-bottom: 0.25rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.section-title i {
    color: var(--dlsu-green);
}

.section-desc {
    font-size: 0.78rem;
    color: var(--dlsu-gray-400);
    margin-bottom: 1.15rem;
}

/* Form Controls */
.form-group {
    margin-bottom: 1rem;
}

.form-label-custom {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--dlsu-gray-800);
    margin-bottom: 0.35rem;
    display: block;
}

.form-label-custom .required {
    color: var(--dlsu-danger);
}

.form-control-custom {
    width: 100%;
    padding: 0.55rem 0.85rem;
    border: 1px solid var(--dlsu-gray-200);
    border-radius: 8px;
    font-size: 0.82rem;
    font-family: inherit;
    outline: none;
    transition:
        border-color 0.2s,
        box-shadow 0.2s;
}

.form-control-custom:focus {
    border-color: var(--dlsu-green);
    box-shadow: 0 0 0 3px var(--dlsu-green-light);
}

textarea.form-control-custom {
    resize: vertical;
    min-height: 140px;
}

select.form-control-custom {
    cursor: pointer;
}

/* Send Button */
.btn-send {
    padding: 0.6rem 1.75rem;
    background: var(--dlsu-green);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 0.85rem;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
}

.btn-send:hover {
    background: var(--dlsu-green-dark);
}

/* Recipient Info */
.recipient-info {
    font-size: 0.75rem;
    color: var(--dlsu-gray-400);
    margin-top: 0.3rem;
    display: flex;
    align-items: center;
    gap: 0.3rem;
}

.recipient-info i {
    color: var(--dlsu-green);
}

/* Sent History */
.sent-item {
    display: flex;
    align-items: flex-start;
    gap: 0.85rem;
    padding: 0.85rem 0;
    border-bottom: 1px solid var(--dlsu-gray-100);
}

.sent-item:last-child {
    border-bottom: none;
}

.sent-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    flex-shrink: 0;
}

.sent-icon.bulk {
    background: var(--dlsu-green-light);
    color: var(--dlsu-green);
}

.sent-icon.individual {
    background: #e4edfb;
    color: #1a56a8;
}

.sent-subject {
    font-size: 0.82rem;
    font-weight: 700;
}

.sent-meta {
    font-size: 0.72rem;
    color: var(--dlsu-gray-400);
    margin-top: 0.1rem;
}

.sent-preview {
    font-size: 0.78rem;
    color: var(--dlsu-gray-600);
    margin-top: 0.25rem;
    line-height: 1.4;
}

/* Tab Content */
.tab-content {
    display: none;
}

.tab-content.active {
    display: block;
}

@media (max-width: 991.98px) {
    .page-body {
        padding: 1.25rem 1rem;
    }
}

                    <div class="form-group"><label class="form-label-custom">Message <span class="required">*</span></label><textarea class="form-control-custom" id="individualMessage" placeholder="Write your message here..."></textarea></div>
                    <button class="btn-send" onclick="sendIndividualEmail()"><i class="bi bi-send-fill"></i> Send Email</button>
                </div>
            </div>
            <div class="section-card">
                <div class="section-title"><i class="bi bi-clock-history"></i> Recently Sent</div>
                <div class="section-desc">Your last sent emails and announcements.</div>

                </div>
            </div>
        </div>
    </div>
